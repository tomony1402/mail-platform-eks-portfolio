apiVersion: apps/v1
kind: Deployment
metadata:
  name: postfix-deployment-b
  namespace: default
  labels:
    app: postfix-b
spec:
  replicas: 35
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: postfix-b
  template:
    metadata:
      labels:
        app: postfix-b
        role: postfix
    spec:
      nodeSelector:
        workload: postfix-b
        karpenter.sh/capacity-type: spot
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postfix-b
              topologyKey: kubernetes.io/hostname
      containers:
        - name: postfix-container
          image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/postfix:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 25
              hostPort: 25
              protocol: TCP
          volumeMounts:
            - name: postfix-spool
              mountPath: /var/spool/postfix
            - name: helo-script
              mountPath: /opt/scripts/helo.sh
              subPath: helo.sh
              readOnly: true
            - name: recipient-canonical
              mountPath: /etc/postfix/recipient_canonical
              subPath: recipient_canonical
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "[preStop] start pod=$HOSTNAME"
                    START=$(date +%s)
                    DEADLINE=$((START + 25))
                    while [ "$(date +%s)" -lt "$DEADLINE" ]; do
                      if postqueue -p 2>/dev/null | grep -q "Mail queue is empty"; then
                        echo "[preStop] done elapsed=$(($(date +%s) - START))s"
                        exit 0
                      fi
                      echo "[preStop] waiting elapsed=$(($(date +%s) - START))s"
                      sleep 3
                    done
                    echo "[preStop] timeout elapsed=25s"
                    exit 0
      volumes:
        - name: postfix-spool
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: helo-script
          configMap:
            name: postfix-helo-script
            defaultMode: 0755
        - name: recipient-canonical
          configMap:
            name: postfix-recipient-canonical
