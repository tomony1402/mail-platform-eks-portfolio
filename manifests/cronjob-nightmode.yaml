---
# ServiceAccount used by nightmode CronJobs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nightmode-controller
  namespace: kube-system
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<YOUR_AWS_ACCOUNT_ID>:role/nightmode-controller-role
---
# ClusterRole: scale deployments + queue monitor
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nightmode-deployment-scaler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
---
# Bind ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nightmode-deployment-scaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nightmode-deployment-scaler
subjects:
  - kind: ServiceAccount
    name: nightmode-controller
    namespace: kube-system
---
# Night mode ON: 22:00 JST (13:00 UTC) — scale down to 10 replicas
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightmode-on
  namespace: kube-system
spec:
  schedule: "0 13 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: nightmode-controller
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  kubectl scale deployment postfix-deployment-a --replicas=8 -n default
                  kubectl scale deployment postfix-deployment-b --replicas=8 -n default
---
# Deep night mode ON: 02:00 JST (17:00 UTC) — scale down to 5 replicas
