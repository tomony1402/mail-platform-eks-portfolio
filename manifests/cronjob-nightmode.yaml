---
# ServiceAccount used by nightmode CronJobs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nightmode-controller
  namespace: kube-system
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<YOUR_AWS_ACCOUNT_ID>:role/nightmode-controller-role
---
# ClusterRole: scale deployments + queue monitor
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nightmode-deployment-scaler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
# Bind ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nightmode-deployment-scaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nightmode-deployment-scaler
subjects:
  - kind: ServiceAccount
    name: nightmode-controller
    namespace: kube-system
---
# Night mode ON: 22:00 JST (13:00 UTC) — scale down to 10 replicas
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightmode-on
  namespace: kube-system
spec:
  schedule: "0 13 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: nightmode-controller
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  kubectl scale deployment postfix-deployment-a --replicas=8 -n default
                  kubectl scale deployment postfix-deployment-b --replicas=8 -n default
---
# Deep night mode ON: 02:00 JST (17:00 UTC) — scale down to 5 replicas
apiVersion: batch/v1
kind: CronJob
metadata:
  name: deepnight-on
  namespace: kube-system
spec:
  schedule: "0 17 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: nightmode-controller
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  kubectl scale deployment postfix-deployment-a --replicas=4 -n default
                  kubectl scale deployment postfix-deployment-b --replicas=4 -n default
---
# Deep night mode OFF: 06:00 JST (21:00 UTC) — scale up to 10 replicas
apiVersion: batch/v1
kind: CronJob
metadata:
  name: deepnight-off
  namespace: kube-system
spec:
  schedule: "0 21 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: nightmode-controller
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  kubectl scale deployment postfix-deployment-a --replicas=8 -n default
                  kubectl scale deployment postfix-deployment-b --replicas=8 -n default
---
# Night mode OFF: 08:00 JST (23:00 UTC) — scale up to 10 replicas
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightmode-off
  namespace: kube-system
spec:
  schedule: "0 23 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: nightmode-controller
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  kubectl scale deployment postfix-deployment-a --replicas=35 -n default
                  kubectl scale deployment postfix-deployment-b --replicas=35 -n default
---
# Queue monitor: every 2 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: queue-monitor
  namespace: kube-system
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: nightmode-controller
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: alpine/k8s:1.30.4
              command:
                - /bin/sh
                - -c
                - |
                  BUCKET="<YOUR_S3_RECOVERY_BUCKET>"
                  PARALLEL=20

                  # [Fix 3] 前回ジョブで生成された0バイトファイルを削除
                  echo "Cleaning up zero-byte files from S3..."
                  aws s3 ls "s3://$BUCKET/pending/" --recursive \
                    | awk -v b="s3://$BUCKET/" '$3 == 0 {print b $4}' \
                    | xargs -r -P 20 -I{} aws s3 rm {} 2>/dev/null || true

                  # [Fix 2] 前回ジョブが途中終了した場合のpending statsをマージ
                  _merge_pending_stats() {
                    aws s3 cp "s3://$BUCKET/stats/recovery-stats.json" /tmp/rstat.json 2>/dev/null \
                      || printf '[]' > /tmp/rstat.json
                    changed=0
                    for fname in $(aws s3 ls "s3://$BUCKET/stats/pending/" 2>/dev/null | awk '{print $4}'); do
                      aws s3 cp "s3://$BUCKET/stats/pending/$fname" /tmp/ps.json 2>/dev/null || continue
                      NEW=$(cat /tmp/ps.json)
                      existing=$(cat /tmp/rstat.json)
                      if [ "$existing" = "[]" ]; then
                        printf '[%s]\n' "$NEW" > /tmp/rstat.json
                      else
                        printf '%s,%s]\n' "${existing%]}" "$NEW" > /tmp/rstat.json
                      fi
                      aws s3 rm "s3://$BUCKET/stats/pending/$fname" 2>/dev/null || true
                      changed=1
                    done
                    [ "$changed" = "1" ] && aws s3 cp /tmp/rstat.json "s3://$BUCKET/stats/recovery-stats.json" || true
                  }
                  _merge_pending_stats

                  hour=$(( ( 10#$(date -u +%H) + 9 ) % 24 ))

                  save_and_delete() {
                    pod=$1
                    count=$2
                    node=$(kubectl get pod -n default "$pod" -o jsonpath='{.spec.nodeName}')

                    if [ "$hour" -ge 9 ] && [ "$hour" -lt 20 ]; then
                      # 9:00〜20:00 JST: S3保存してからノード削除
                      echo "[$pod] $count queued mails. Saving to S3 (parallel=$PARALLEL)..."

                      queue_ids=$(kubectl exec -n default "$pod" -- postqueue -p 2>/dev/null \
                        | awk '/^[A-F0-9]/{print $1}' | tr -d '*!')

                      jobs=0
                      for qid in $queue_ids; do
                        (
                          # [Fix 1] 0バイト対策: postcat出力が空ならアップロードしない
                          tmpfile=$(mktemp)
                          kubectl exec -n default "$pod" -- postcat -q "$qid" 2>/dev/null > "$tmpfile"
                          if [ -s "$tmpfile" ]; then
                            aws s3 cp "$tmpfile" "s3://$BUCKET/pending/$pod/$qid.eml" || true
                          fi
                          rm -f "$tmpfile"
                        ) &
                        jobs=$((jobs + 1))
                        if [ "$jobs" -ge "$PARALLEL" ]; then
                          wait
                          jobs=0
                        fi
                      done
                      wait

                      saved=$(aws s3 ls "s3://$BUCKET/pending/$pod/" | wc -l)
                      echo "[$pod] S3 save complete ($saved files). Deleting node $node (queue: $count)"
                      kubectl delete node "$node"

                      # [Fix 2] Pod単位でstatsを即座にS3へ書き込む（ジョブ途中終了対策）
                      ts=$(date -u +%Y%m%dT%H%M%SZ)
                      printf '{"timestamp":"%s","pod":"%s","count":%d}\n' "$ts" "$pod" "$saved" \
                        > "/tmp/stat_${pod}.json"
                      aws s3 cp "/tmp/stat_${pod}.json" "s3://$BUCKET/stats/pending/$pod.json" || true
                    else
                      # 20:00〜9:00 JST: 即ノード削除（S3保存スキップ）
                      echo "[$pod] $count queued mails. Night mode: skipping S3, deleting node $node"
                      kubectl delete node "$node"
                    fi
                  }

                  for pod in $(kubectl get pods -n default -l role=postfix | awk 'NR>1{print $1}'); do
                    count=$(kubectl exec -n default "$pod" -- postqueue -p 2>/dev/null | grep -c "^[A-F0-9]" || true)
                    if [ "$count" -gt 1000 ]; then
                      save_and_delete "$pod" "$count" &
                    fi
                  done
                  wait

                  # 全Pod処理完了後にrecovery-stats.jsonへマージ
                  if ls /tmp/stat_*.json 2>/dev/null | grep -q .; then
                    aws s3 cp "s3://$BUCKET/stats/recovery-stats.json" /tmp/rstat.json 2>/dev/null \
                      || printf '[]' > /tmp/rstat.json
                    for f in /tmp/stat_*.json; do
                      [ -f "$f" ] || continue
                      NEW=$(cat "$f")
                      existing=$(cat /tmp/rstat.json)
                      if [ "$existing" = "[]" ]; then
                        printf '[%s]\n' "$NEW" > /tmp/rstat.json
                      else
                        printf '%s,%s]\n' "${existing%]}" "$NEW" > /tmp/rstat.json
                      fi
                      pod_key=$(basename "$f" .json | sed 's/^stat_//')
                      aws s3 rm "s3://$BUCKET/stats/pending/$pod_key.json" 2>/dev/null || true
                    done
                    aws s3 cp /tmp/rstat.json "s3://$BUCKET/stats/recovery-stats.json" || true
                    rm -f /tmp/stat_*.json
                  fi
