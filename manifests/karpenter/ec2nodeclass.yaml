apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: mail-nodes
spec:
  role: <YOUR_NODE_ROLE_NAME>

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: mail-platform-eks

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: mail-platform-eks

  amiSelectorTerms:
    - alias: al2023@latest

