apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: mail-nodes-b-od
spec:
  weight: 1
  template:
    metadata:
      labels:
        workload: postfix-b
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: mail-nodes
      expireAfter: 50m
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.small", "t3a.small", "t2.small"]
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
